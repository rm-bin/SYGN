<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>SYGN</title>
        <style>
            * {
                margin: 0;
                padding: 0;
            }

            body {
                width: 100%;
                height: 100vh;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                gap: 2rem;
                background-color: #0a0a0a;
            }

            p,
            a {
                font-family:
                    system-ui,
                    -apple-system,
                    BlinkMacSystemFont,
                    'Segoe UI',
                    Roboto,
                    Oxygen,
                    Ubuntu,
                    Cantarell,
                    'Open Sans',
                    'Helvetica Neue',
                    sans-serif;
                color: #fafafa;
            }

            .author {
                & > span {
                    background: #262626;
                    padding: 0.25rem 0.5rem;
                    font-family: monospace;
                    font-size: 1.25rem;
                    border-radius: 0.5rem;
                }
            }

            .url {
                text-decoration: underline;
                text-underline-offset: 0.25rem;
                color: #a1a1a1;
            }

            .code {
                display: flex;
                align-items: center;
                gap: 0.5rem;

                & > button {
                    background: #262626;
                    color: #fafafa;
                    border: none;
                    padding: 0.5rem 1rem;
                    height: 3rem;
                    cursor: pointer;
                    border-radius: 1rem;
                    transition: background 0.2s;
                    font-weight: 700 !important;
                    font-family: monospace;
                    font-size: 1rem;

                    &:hover {
                        background: #373737;
                    }

                    &.copied {
                        background: #00c950;
                        &:hover {
                            background: #05df72;
                        }
                    }
                }
            }

            #code {
                font-family: monospace;
                font-weight: 700 !important;
                font-size: 1rem;
                background: #262626;
                padding: 0.75rem 1.25rem;
                border-radius: 1rem;
                box-sizing: border-box;
                height: 3rem;
                display: flex;
                align-items: center;
                gap: 0.5rem;

                & > span:nth-child(1) {
                    color: #00c950;
                }
                & > span:nth-child(2) {
                    color: #737373;
                }
                & > span:nth-child(3) {
                    color: #a684ff;
                }
                & > span:nth-child(4) {
                    color: #a1a1a1;
                }
                & > span:nth-child(5) {
                    color: #00c950;
                }
            }
        </style>
        <link rel="icon" href="assets/logo_small.svg" />
    </head>
    <body>
        <img src="assets/logo_large.svg" alt="SYGN Logo" width="256" />
        <p class="author">SYGN by <span>rm-bin</span></p>
        <a class="url" href="https://github.com/rm-bin">github.com/rm-bin</a>
        <div class="code">
            <p id="code">
                <span>curl</span>
                <span>-fsSL</span>
                <span>https://sygn.pages.dev/install.sh</span>
                <span>|</span>
                <span>bash</span>
            </p>
            <button id="copy">COPY</button>
        </div>
        <script>
            const copy = document.getElementById('copy');
            copy.addEventListener('click', () => {
                navigator.clipboard.writeText('curl -fsSL https://sygn.pages.dev/install.sh | bash');
                copy.innerText = 'COPIED';
                copy.classList.add('copied');
                setTimeout(() => {
                    copy.innerText = 'COPY';
                    copy.classList.remove('copied');
                }, 2000);
            });
        </script>
    </body>
</html>
