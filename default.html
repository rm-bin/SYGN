<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>SYGN</title>
        <style>
            * {
                margin: 0;
                padding: 0;
            }

            body {
                width: 100%;
                height: 100vh;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                gap: 2rem;
                background-color: #0a0a0a;
            }

            p {
                font-weight: 500;
            }

            .author {
                & > span {
                    background: #262626;
                    padding: 0.25rem 0.5rem;
                    font-family: monospace;
                    font-size: 1.25rem;
                    border-radius: 0.5rem;
                }
            }

            .url {
                text-decoration: underline;
                text-underline-offset: 0.25rem;
                color: #737373;
            }
        </style>
        <link rel="icon" href="assets/logo_small.svg" />
    </head>
    <body>
        <img src="assets/logo_large.svg" alt="SYGN Logo" width="256" />
        <p class="author">SYGN by <span>rm-bin</span></p>
        <p class="url">github.com/rm-bin</p>
    </body>
</html>
